version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    groups:
      github-actions-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: 'pip'
    directory: '.github/workflows'
    schedule:
      interval: 'daily'
    groups:
      pip-workflows-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7
